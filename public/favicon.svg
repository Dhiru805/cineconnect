<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#EAB308"/>
      <stop offset="100%" stop-color="#CA8A04"/>
    </linearGradient>
  </defs>
  <!-- Gold rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- Lucide Film icon centered, scaled to fit inside the 32x32 box -->
  <!-- Original Lucide Film is 24x24 viewBox; we map it to ~18x18 centered at (7,7) -->
  <g transform="translate(7,7) scale(0.75)" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- outer rect -->
    <rect x="0" y="0" width="24" height="24" rx="2"/>
    <!-- vertical dividers -->
    <line x1="6"  y1="0"  x2="6"  y2="24"/>
    <line x1="18" y1="0"  x2="18" y2="24"/>
    <!-- horizontal bars -->
    <line x1="0"  y1="8"  x2="6"  y2="8"/>
    <line x1="18" y1="8"  x2="24" y2="8"/>
    <line x1="0"  y1="16" x2="6"  y2="16"/>
    <line x1="18" y1="16" x2="24" y2="16"/>
  </g>
</svg>
